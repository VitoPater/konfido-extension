<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konfido</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: system-ui, sans-serif;
      background: #fff;
      color: #1a1a1a;
    }

    header {
      background: #043E12;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header span {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D39E40;
    }

    .body {
      padding: 16px;
    }

    .page-info {
      font-size: 12px;
      color: #666;
      margin-bottom: 14px;
      line-height: 1.4;
      word-break: break-word;
    }

    .page-title {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    button {
      width: 100%;
      padding: 10px 14px;
      background: #043E12;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #065218; }
    button:disabled { background: #999; cursor: default; }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      color: #555;
      min-height: 18px;
    }

    .status.ok { color: #043E12; font-weight: 500; }
    .status.err { color: #c0392b; }
  </style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <span>Konfido</span>
  </header>

  <div class="body">
    <div class="page-title" id="page-title">Nacitam...</div>
    <div class="page-info" id="page-url"></div>

    <button id="btn-send">Odeslat celou stranku</button>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
